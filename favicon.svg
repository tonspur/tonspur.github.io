<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1430"/>
      <stop offset="1" stop-color="#0c0a16"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6d4ed6"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1.5"/>
  <g filter="url(#glow)" fill="url(#bar)">
    <rect x="13" y="27" width="6" height="10" rx="3"/>
    <rect x="23" y="20" width="6" height="24" rx="3"/>
    <rect x="33" y="12" width="6" height="40" rx="3"/>
    <rect x="43" y="22" width="6" height="20" rx="3"/>
    <rect x="53" y="29" width="0" height="0"/>
  </g>
  <circle cx="49" cy="17" r="3" fill="#e9d5ff" filter="url(#glow)"/>
</svg>
